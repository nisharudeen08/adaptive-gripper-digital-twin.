controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - shoulder_joint
      - elbow_joint
      - wrist_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    goal_time_tolerance: 1.0
    stopped_velocity_tolerance: 0.05
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 1.0
    gains:
      shoulder_joint:
        p: 50.0
        i: 0.01
        d: 5.0
        i_clamp: 1.0
      elbow_joint:
        p: 40.0
        i: 0.01
        d: 4.0
        i_clamp: 1.0
      wrist_joint:
        p: 30.0
        i: 0.01
        d: 3.0
        i_clamp: 1.0

gripper_controller:
  ros__parameters:
    joints:
      - finger_left_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    goal_time_tolerance: 1.0
    stopped_velocity_tolerance: 0.05
    gains:
      finger_left_joint:
        p: 20.0
        i: 0.01
        d: 2.0
        i_clamp: 0.5
